<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            color: white;
            text-align: center;
        }
        .login-card i {
            font-size: 3rem;
            color: #22c55e;
            margin-bottom: 20px;
        }
        h2 { margin-bottom: 30px; }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label { display: block; margin-bottom: 8px; color: #94a3b8; }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 1rem;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #22c55e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .login-btn:hover { background-color: #16a34a; }
    </style>
</head>
<body>
<div class="login-card">
    <i class="fas fa-user-shield"></i>
    <h2>College Admin Login</h2>
    <div class="input-group">
        <label>Username</label>
        <input type="text" id="username">
    </div>
    <div class="input-group">
        <label>Password</label>
        <input type="password" id="password">
    </div>
    <button class="login-btn" onclick="collegeAdminLogin()">Login</button>
<p id="error-msg" style="color:#ef4444; margin-top:15px; display:none;">
    Invalid Admin Username or Password
</p>
</div>
<script>
async function collegeAdminLogin() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const error = document.getElementById("error-msg");
    const response = await fetch("/college_admin_auth", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: username,
            password: password
        })
    });
    const data = await response.json();
    if (data.success) {
        window.location.href = "/college_admin_dashboard";
    } else {
        error.style.display = "block";
    }
}
</script>
</body>
</html>
